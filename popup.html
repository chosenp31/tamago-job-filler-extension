<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 340px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
      color: #333;
    }
    h2 {
      margin: 0 0 12px 0;
      font-size: 16px;
      color: #1a73e8;
    }
    .btn {
      display: block;
      width: 100%;
      padding: 12px;
      margin-bottom: 8px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .btn-copy {
      background: #1a73e8;
      color: #fff;
    }
    .btn-copy:hover:not(:disabled) { background: #1557b0; }
    .btn-paste {
      background: #34a853;
      color: #fff;
    }
    .btn-paste:hover:not(:disabled) { background: #2d8f47; }
    .btn-clear {
      background: #f1f3f4;
      color: #666;
      font-weight: 400;
      font-size: 12px;
    }
    .btn-clear:hover:not(:disabled) { background: #e0e2e3; }
    .status {
      margin-top: 8px;
      padding: 8px;
      border-radius: 6px;
      font-size: 12px;
      display: none;
      white-space: pre-wrap;
      line-height: 1.5;
    }
    .status.success {
      display: block;
      background: #e6f4ea;
      color: #1e7e34;
    }
    .status.error {
      display: block;
      background: #fce8e6;
      color: #c5221f;
    }
    .status.info {
      display: block;
      background: #e8f0fe;
      color: #1a73e8;
    }
    .status.warning {
      display: block;
      background: #fef7e0;
      color: #b06000;
    }
    .stored-info {
      margin: 8px 0;
      padding: 8px;
      background: #f8f9fa;
      border-radius: 6px;
      font-size: 11px;
      color: #666;
    }
    .stored-info .title {
      font-weight: 600;
      color: #333;
    }
    .stored-info .field-count {
      margin-top: 4px;
      color: #888;
    }
  </style>
</head>
<body>
  <h2>Tamago-DB 求人自動入力</h2>

  <div id="stored-info" class="stored-info" style="display:none;">
    <div>保存済み: <span class="title" id="stored-title"></span></div>
    <div class="field-count" id="stored-fields"></div>
  </div>

  <button class="btn btn-copy" id="btn-copy">1. 求人情報をコピー</button>
  <button class="btn btn-paste" id="btn-paste">2. Tamago-DBに貼り付け</button>
  <button class="btn btn-clear" id="btn-clear">保存データをクリア</button>

  <div id="status" class="status"></div>

  <script src="popup.js"></script>
</body>
</html>
